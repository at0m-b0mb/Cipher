# Cipher — Red & Blue Team Academy
#
# Project is generated with XcodeGen so the two app targets (iPhone + Apple
# Watch) and their shared sources stay in sync from one declarative file.
#
#   brew install xcodegen   # one time
#   xcodegen generate       # run from this folder whenever files are added
#   open Cipher.xcodeproj
#
# The `Shared` folder compiles into BOTH targets (pure SwiftUI + Foundation,
# no UIKit) so the curriculum engine, content and design system are written once.

name: Cipher

options:
  bundleIdPrefix: com.at0mb0mb
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: MXA2HAFVNC
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_PREVIEWS: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

targets:

  # ── iPhone app ─────────────────────────────────────────────────────────────
  Cipher:
    type: application
    platform: iOS
    sources:
      - path: Shared
      - path: CipheriOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.at0mb0mb.cipher
        PRODUCT_NAME: Cipher
        INFOPLIST_KEY_CFBundleDisplayName: Cipher
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    dependencies:
      - target: Cipher Watch App
        embed: true

  # ── Apple Watch companion ────────────────────────────────────────────────────
  Cipher Watch App:
    type: application
    platform: watchOS
    sources:
      - path: Shared
      - path: CipherWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.at0mb0mb.cipher.watchkitapp
        PRODUCT_NAME: CipherWatch
        INFOPLIST_KEY_CFBundleDisplayName: Cipher
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.at0mb0mb.cipher
        SUPPORTED_PLATFORMS: "watchos watchsimulator"
        TARGETED_DEVICE_FAMILY: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

schemes:
  Cipher:
    build:
      targets:
        Cipher: all
    run:
      config: Debug
  Cipher Watch App:
    build:
      targets:
        Cipher Watch App: all
    run:
      config: Debug
